<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>

<body>
    <h1>Welcome to a Rock-Paper-Scissors Game!</h1>
    <p>Click a button to make your choice, then click "Start Game" to play.</p>
    
    <button id="rock-button">Rock</button>
    <button id="paper-button">Paper</button>
    <button id="scissors-button">Scissors</button>
    <button id="start-button">Start Game</button>

    <p id="result"></p>
    <span id="player-score"></span>
    <span id="opponent-score"></span>

    <script src="scripts/game-logic.js"></script>
</body>

</html>
