<!DOCTYPE html>
<html lang="en">

<head>

    <title>Game</title>
    <link href="styles/game-style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand">Rock-Paper-Scissors</a>
            <button class="bi bi-arrow-repeat" id="reset-button">Reset Game?</button>
        </div>
    </nav>
    <p>Click a button to make your choice, then click "Start Game" to play.</p>
    
    <button class="play-button" id="rock-button">Rock</button>
    <button class="play-button" id="paper-button">Paper</button>
    <button class="play-button" id="scissors-button">Scissors</button>
    <div></div>
    <button id="start-button">Start Game</button>

    <p id="result"></p>
    <span id="player-score"></span>
    <span id="opponent-score"></span>
